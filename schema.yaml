---
name: mirion_catalog
"@id": "#mirion_catalog"
description: "MIRION Catalog of Yellowballs (Wolf-Chase, Kerton, Devine, et al.) -- one row per YB source,
  merged from the catalog's Distances, Herschel-Matched, Photometry, Velocities, and Cross-match
  Machine Readable Tables."

######################################################
# CONVENTIONS
# - Column names/units/descriptions are taken verbatim from the byte-by-byte
#   headers of the source MRT files (MRT-dist.txt, MRT-hcsc.txt, MRT-phot.txt,
#   MRT-velo.txt, MRT-xmat.txt), lowercased.
# - All MRT-derived columns are nullable: a value of `999` (numeric) or a
#   blank field in the source MRT files is stored as null.
# - See scripts/build_mirion_dataset.py for the generator that produced the
#   `Sources` table's columns and data/source/mirion_sources.json.
######################################################

tables:
####################################################
# LOOKUP TABLES
# These tables are expected and used by other tables
# ###################################################

  - name: Publications
    "@id": "#Publications"
    description: "The Publications table contains metadata (DOI, bibcodes, etc) for each publication referred to in the database.
      The *reference* short identifer of each publication is required to be unique."
    primaryKey:
    - "#Publications.reference"

    columns:
    - name: reference
      "@id": "#Publications.reference"
      datatype: string
      length: 30
      description: Publication short identifier
      ivoa:ucd: meta.ref;meta.main
      nullable: false
    - name: bibcode
      "@id": "#Publications.bibcode"
      datatype: string
      length: 100
      description: Publication bibcode from NASA ADS
      ivoa:ucd: meta.bib.bibcode
    - name: doi
      "@id": "#Publications.doi"
      datatype: string
      length: 100
      description: Publication Document Object Identifier (DOI)
      ivoa:ucd: meta.ref.doi
    - name: description
      "@id": "#Publications.description"
      datatype: string
      length: 1000
      description: Publication description
      ivoa:ucd: meta.title

    indexes:
    - name: PK_Publications
      "@id": "#PK_Publications"
      description: Primary key for Publications table
      columns:
      - "#Publications.reference"


  - name: Sources
    "@id": "#Sources"
    description: "The Sources table contains the full MIRION Yellowball (YB) catalog: one row per YB,
      combining the Distances, Herschel-Matched, Photometry, Velocities, and Cross-match tables
      from the source publication. The *source* identifier (YB1..YB6176) is unique."
    primaryKey:
    - "#Sources.source"

    columns:
    - name: source
      "@id": "#Sources.source"
      datatype: string
      length: 12
      ivoa:ucd: meta.id;src;meta.main
      description: YB identifier for the source (YB<catalog ID>)
      nullable: false
    - name: yb_number
      "@id": "#Sources.yb_number"
      datatype: int
      ivoa:ucd: meta.id
      description: MIRION catalog identification number (matches the ID column in the source MRT files)
      nullable: false
    - name: reference
      "@id": "#Sources.reference"
      datatype: string
      length: 30
      ivoa:ucd: meta.ref;meta.main
      description: Publication reference for this catalog entry; links to Publications table
      nullable: false
    - name: dist
      "@id": "#Sources.dist"
      datatype: double
      fits:tunit: kpc
      ivoa:ucd: pos.distance
      description: Adopted distance
    - name: e_dist
      "@id": "#Sources.e_dist"
      datatype: double
      fits:tunit: kpc
      description: Uncertainty in distance
    - name: dist_c
      "@id": "#Sources.dist_c"
      datatype: double
      fits:tunit: kpc
      description: Distance from Elia et al. (2021)
    - name: dist_m
      "@id": "#Sources.dist_m"
      datatype: double
      fits:tunit: kpc
      description: Distance from Mege et al. (2021)
    - name: e_dist_m
      "@id": "#Sources.e_dist_m"
      datatype: double
      fits:tunit: kpc
      description: Uncertainty in distance from Mege et al. (2021)
    - name: stat_m
      "@id": "#Sources.stat_m"
      datatype: string
      length: 11
      description: Status flag from Mege et al. (2021)
    - name: pfar
      "@id": "#Sources.pfar"
      datatype: double
      description: P_far parameter for Reid et al. (2019) distance finder (RDF)
    - name: dist_r1
      "@id": "#Sources.dist_r1"
      datatype: double
      fits:tunit: kpc
      description: Most probable RDF distance
    - name: e_dist_r1
      "@id": "#Sources.e_dist_r1"
      datatype: double
      fits:tunit: kpc
      description: Uncertainty in most probable RDF distance
    - name: pint_r1
      "@id": "#Sources.pint_r1"
      datatype: double
      description: Integrated probability for most probable RDF distance
    - name: arm_r1
      "@id": "#Sources.arm_r1"
      datatype: string
      length: 5
      description: Name of associated spiral arm for most probable RDF distance (1)
    - name: dist_r2
      "@id": "#Sources.dist_r2"
      datatype: double
      fits:tunit: kpc
      description: Second-most probable RDF distance
    - name: e_dist_r2
      "@id": "#Sources.e_dist_r2"
      datatype: double
      fits:tunit: kpc
      description: Uncertainty in second-most probable RDF distance
    - name: pint_r2
      "@id": "#Sources.pint_r2"
      datatype: double
      description: Integrated probability for second-most probable RDF distance
    - name: arm_r2
      "@id": "#Sources.arm_r2"
      datatype: string
      length: 5
      description: Name of associated spiral arm for second-most probable RDF distance (1)
    - name: diam
      "@id": "#Sources.diam"
      datatype: double
      fits:tunit: pc
      description: Diameter
    - name: e_diam
      "@id": "#Sources.e_diam"
      datatype: double
      fits:tunit: pc
      description: Uncertainty in diameter
    - name: mass
      "@id": "#Sources.mass"
      datatype: double
      fits:tunit: Msun
      ivoa:ucd: phys.mass
      description: Mass
    - name: e_mass
      "@id": "#Sources.e_mass"
      datatype: double
      fits:tunit: Msun
      description: Uncertainty in mass
    - name: blum
      "@id": "#Sources.blum"
      datatype: double
      fits:tunit: Lsun
      ivoa:ucd: phys.luminosity
      description: Bolometric luminosity
    - name: e_blum
      "@id": "#Sources.e_blum"
      datatype: double
      fits:tunit: Lsun
      description: Uncertainty in bolometric luminosity
    - name: lmrat
      "@id": "#Sources.lmrat"
      datatype: double
      fits:tunit: Lsun/Msun
      description: Bolometric luminosity/mass ratio
    - name: e_lmrat
      "@id": "#Sources.e_lmrat"
      datatype: double
      fits:tunit: Lsun/Msun
      description: Uncertainty in bolometric luminosity/mass ratio
    - name: temp
      "@id": "#Sources.temp"
      datatype: double
      fits:tunit: K
      ivoa:ucd: phys.temperature
      description: Temperature from graybody fit
    - name: e_temp
      "@id": "#Sources.e_temp"
      datatype: double
      fits:tunit: K
      description: Uncertainty in temperature
    - name: lrat
      "@id": "#Sources.lrat"
      datatype: double
      description: Luminosity ratio
    - name: e_lrat
      "@id": "#Sources.e_lrat"
      datatype: double
      description: Uncertainty in luminosity ratio
    - name: tbol
      "@id": "#Sources.tbol"
      datatype: double
      fits:tunit: K
      ivoa:ucd: phys.temperature
      description: Bolometric temperature
    - name: e_tbol
      "@id": "#Sources.e_tbol"
      datatype: double
      fits:tunit: K
      description: Uncertainty in bolometric temperature
    - name: sigma
      "@id": "#Sources.sigma"
      datatype: double
      fits:tunit: g/cm^2
      description: Surface density
    - name: e_sigma
      "@id": "#Sources.e_sigma"
      datatype: double
      fits:tunit: g/cm^2
      description: Uncertainty in surface density
    - name: glon
      "@id": "#Sources.glon"
      datatype: double
      fits:tunit: deg
      ivoa:ucd: pos.galactic.lon
      description: Galactic longitude
    - name: glat
      "@id": "#Sources.glat"
      datatype: double
      fits:tunit: deg
      ivoa:ucd: pos.galactic.lat
      description: Galactic latitude
    - name: mwpr
      "@id": "#Sources.mwpr"
      datatype: double
      fits:tunit: deg
      description: MWP radius
    - name: e_glon
      "@id": "#Sources.e_glon"
      datatype: double
      fits:tunit: deg
      description: Uncertainty in Galactic longitude
    - name: e_glat
      "@id": "#Sources.e_glat"
      datatype: double
      fits:tunit: deg
      description: Uncertainty in Galactic latitude
    - name: e_mwpr
      "@id": "#Sources.e_mwpr"
      datatype: double
      fits:tunit: deg
      description: Uncertainty in MWP radius
    - name: hrate
      "@id": "#Sources.hrate"
      datatype: double
      description: MWP hit rate
    - name: f8
      "@id": "#Sources.f8"
      datatype: double
      fits:tunit: Jy
      ivoa:ucd: phot.flux.density
      description: Flux density at 8 microns
    - name: e_f8
      "@id": "#Sources.e_f8"
      datatype: double
      fits:tunit: Jy
      ivoa:ucd: phot.flux.density
      description: Uncertainty in flux density at 8 microns
    - name: f12
      "@id": "#Sources.f12"
      datatype: double
      fits:tunit: Jy
      ivoa:ucd: phot.flux.density
      description: Flux density at 12 microns
    - name: e_f12
      "@id": "#Sources.e_f12"
      datatype: double
      fits:tunit: Jy
      ivoa:ucd: phot.flux.density
      description: Uncertainty in flux density at 12 microns
    - name: f24
      "@id": "#Sources.f24"
      datatype: double
      fits:tunit: Jy
      ivoa:ucd: phot.flux.density
      description: Flux density at 24 microns
    - name: e_f24
      "@id": "#Sources.e_f24"
      datatype: double
      fits:tunit: Jy
      ivoa:ucd: phot.flux.density
      description: Uncertainty in flux density at 24 microns
    - name: f70
      "@id": "#Sources.f70"
      datatype: double
      fits:tunit: Jy
      ivoa:ucd: phot.flux.density
      description: Flux density at 70 microns
    - name: e_f70
      "@id": "#Sources.e_f70"
      datatype: double
      fits:tunit: Jy
      ivoa:ucd: phot.flux.density
      description: Uncertainty in flux density at 70 microns
    - name: n8
      "@id": "#Sources.n8"
      datatype: int
      description: Number of photometric measurements at 8 microns
    - name: n12
      "@id": "#Sources.n12"
      datatype: int
      description: Number of photometric measurements at 12 microns
    - name: n24
      "@id": "#Sources.n24"
      datatype: int
      description: Number of photometric measurements at 24 microns
    - name: n70
      "@id": "#Sources.n70"
      datatype: int
      description: Number of photometric measurements at 70 microns
    - name: f_sat
      "@id": "#Sources.f_sat"
      datatype: string
      length: 4
      description: Saturation flag (1)
    - name: f_multi
      "@id": "#Sources.f_multi"
      datatype: int
      description: Multiple source flag (2)
    - name: f_nosrc
      "@id": "#Sources.f_nosrc"
      datatype: string
      length: 4
      description: No clear source flag (1)
    - name: f_pconf
      "@id": "#Sources.f_pconf"
      datatype: string
      length: 4
      description: Poor confidence in photometry (1)
    - name: f_cext
      "@id": "#Sources.f_cext"
      datatype: int
      description: Highly circular extended source (2)
    - name: vlsr
      "@id": "#Sources.vlsr"
      datatype: double
      fits:tunit: km/s
      ivoa:ucd: spect.dopplerVeloc
      description: Adopted velocity (1)
    - name: e_vlsr
      "@id": "#Sources.e_vlsr"
      datatype: double
      fits:tunit: km/s
      description: Uncertainty in VLSR
    - name: stype
      "@id": "#Sources.stype"
      datatype: string
      length: 4
      description: Type of spectrum (2)
    - name: vlsr_g
      "@id": "#Sources.vlsr_g"
      datatype: double
      fits:tunit: km/s
      description: Velocity from GRS (3)
    - name: vlsr_s
      "@id": "#Sources.vlsr_s"
      datatype: double
      fits:tunit: km/s
      description: Velocity from SEDIGISM (3)
    - name: vlsr_f
      "@id": "#Sources.vlsr_f"
      datatype: double
      fits:tunit: km/s
      description: Velocity from FCRAO OGS (3)
    - name: vlsr_t
      "@id": "#Sources.vlsr_t"
      datatype: double
      fits:tunit: km/s
      description: Velocity from ThrUMMS (3)
    - name: vlsr_dht
      "@id": "#Sources.vlsr_dht"
      datatype: double
      fits:tunit: km/s
      description: Velocity from DHT survey (3)
    - name: vlsr_dgt
      "@id": "#Sources.vlsr_dgt"
      datatype: double
      fits:tunit: km/s
      description: Velocity from dense gas tracer (DGT) survey (3)
    - name: dgt
      "@id": "#Sources.dgt"
      datatype: string
      length: 11
      description: DGT survey (3)
    - name: vlsr_c
      "@id": "#Sources.vlsr_c"
      datatype: double
      fits:tunit: km/s
      description: Velocity reported in Elia et al. (2021)
    - name: vlsr_m
      "@id": "#Sources.vlsr_m"
      datatype: double
      fits:tunit: km/s
      description: Velocity reported in Mege et al. (2021)
    - name: e_vlsr_m
      "@id": "#Sources.e_vlsr_m"
      datatype: double
      fits:tunit: km/s
      description: Uncertainty in VLSR_M
    - name: higal
      "@id": "#Sources.higal"
      datatype: string
      length: 22
      description: Hi-GAL 360 source identifier
    - name: agal
      "@id": "#Sources.agal"
      datatype: string
      length: 17
      description: ATLASGAL source identifier
    - name: corn
      "@id": "#Sources.corn"
      datatype: string
      length: 17
      description: CORNISH source identifier
    - name: corn_t
      "@id": "#Sources.corn_t"
      datatype: string
      length: 18
      description: CORNISH source type
    - name: rms
      "@id": "#Sources.rms"
      datatype: string
      length: 18
      description: RMS source identifier
    - name: rms_t
      "@id": "#Sources.rms_t"
      datatype: string
      length: 14
      description: RMS source type
    - name: wise
      "@id": "#Sources.wise"
      datatype: string
      length: 15
      description: WISE source identifier
    - name: wise_t
      "@id": "#Sources.wise_t"
      datatype: string
      length: 1
      description: WISE source type

    indexes:
      - name: PK_Sources_source
        "@id": "#PK_Sources_source"
        description: Primary key for Sources table
        columns:
        - "#Sources.source"
      - name: IDX_Sources_yb_number
        "@id": "#IDX_Sources_yb_number"
        description: Index for numeric lookups/sorting by catalog ID
        columns:
        - "#Sources.yb_number"
    constraints:
      - name: check_glat
        "@type": Check
        "@id": "#Sources_check_glat_bounds"
        description: Validate Galactic latitude range
        expression: glat >= -90 AND glat <= 90
      - name: Sources_reference_Publications_reference
        "@type": "ForeignKey"
        "@id": "#FK_Sources_reference_Publications_reference"
        description: Link Sources reference to Publications table
        columns:
        - "#Sources.reference"
        referencedColumns:
        - "#Publications.reference"
